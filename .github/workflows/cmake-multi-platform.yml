# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml

# cspell: words DCMAKE DVCPKG MSVC buildsystems runneradmin
name: build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      # Set fail-fast to false to ensure that feedback is delivered for all matrix combinations. Consider changing this to true when your workflow is stable.
      fail-fast: false

      # Set up a matrix to run the following 3 configurations:
      # 1. <Windows, Release, latest MSVC compiler toolchain on the default runner image, default generator>
      # 2. <Linux, Release, latest GCC compiler toolchain on the default runner image, default generator>
      # 3. <Linux, Release, latest Clang compiler toolchain on the default runner image, default generator>
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.) customize the build_type list.
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
          - os: macos-latest
            c_compiler: cl

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set reusable strings
        # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
        id: strings
        shell: bash
        run: |
          packages_dir="$HOME/packages"
          if [[ "$packages_dir" == /c/* ]]; then
            # Convert the path to a Windows-style path if it is a Cygwin-style path (e.g., /c/Users/runneradmin/packages -> C:\Users\runneradmin\packages)
            packages_dir="$(cygpath -w "$packages_dir")"
          fi
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
          echo "packages-dir=$packages_dir" >> "$GITHUB_OUTPUT"

      - name: Install Catch2 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y catch2
      - name: Install Catch2 (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install catch2
      - name: Install Catch2 (Windows)
        if: matrix.os == 'windows-latest'
        run: vcpkg install catch2:x64-windows

      - name: Install Python and pip
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create Build Directory and install nihtest
        run: |
          cmake -E make_directory "${{ steps.strings.outputs.build-output-dir }}"
          pip install nihtest

      - name: Configure CMake (Windows with vcpkg)
        if: matrix.os == 'windows-latest'
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        shell: bash
        run: >
          cmake
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_INSTALL_PREFIX="${{ steps.strings.outputs.packages-dir }}"
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows
          -S ..

      - name: Configure CMake (Non-Windows)
        if: matrix.os != 'windows-latest'
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: >
          cmake
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_INSTALL_PREFIX="${{ steps.strings.outputs.packages-dir }}"
          -S ..

      - name: Build
        # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        # To debug compile errors, show the full command line for compilation:
        #   -DCMAKE_VERBOSE_MAKEFILE:BOOL=ON
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: cmake --build . --config ${{ matrix.build_type }}

      - name: Test
        # Execute tests defined by the CMake configuration. Note that --build-config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: ctest --output-on-failure --verbose --build-config ${{ matrix.build_type }}

      - name: Install
        working-directory: ${{ steps.strings.outputs.build-output-dir }}
        run: cmake --install . --config ${{ matrix.build_type }}

      - name: Upload Package
        # Until we have an official release, we will use these builds in projects using this library, so keep them.
        uses: actions/upload-artifact@v7
        with:
          name: tpau-cpp-kernal-${{ matrix.os }}-${{ matrix.c_compiler }}
          path: |
            ${{ steps.strings.outputs.packages-dir }}
