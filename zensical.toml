# cspell: ignore fontawesome inlinehilite linenums mkdocstrings nbsp pygments pymdownx superfences def_list

[project]
site_name = "&nbsp;"
site_url = "https://tpau-cpp-kernal.tpau.group/"
repo_url = "https://github.com/T-Pau/tpau-cpp-kernal"
copyright = "©2026 Dieter Baron"
site_author = "Dieter Baron"
site_description = "A Collection of C++ classes."

nav = [
    {"T'Pau C++ Kernal" = "index.md"},
    {"Tutorials" = [
        {"index.md" = "Tutorials/index.md"},
        {"Building the Library" = "Tutorials/Building.md"},
    ]},
    {"How-To Guides" = [
        { "index.md" = "How-To-Guides/index.md" },
        { "Using it in a CMake Project" = "How-To-Guides/Using-cmake.md" },
        { "Using it with pkg-config" = "How-To-Guides/Using-pkg-config.md" },
    ]},
    {"Reference" = [
        { "index.md" = "Reference/index.md" },
        { "Base64Coder" = "Reference/Base64Coder.md" },
        { "Coder" = "Reference/Coder.md" },
        { "Command" = "Reference/Command.md" },
        { "Commandline" = "Reference/Commandline.md" },
        { "DiagnosticOutput" = "Reference/DiagnosticOutput.md" },
        { "Exception" = "Reference/Exception.md" },
        { "FileReader" = "Reference/FileReader.md" },
        { "FileSource" = "Reference/FileSource.md" },
        { "HexCoder" = "Reference/HexCoder.md" },
        { "Int" = "Reference/Int.md" },
        { "Location" = "Reference/Location.md" },
        { "Path" = "Reference/Path.md" },
        { "Symbol" = "Reference/Symbol.md" },
        { "Util" = "Reference/Util.md" },
        { "Value" = "Reference/Value.md" },
    ]},
    {"Explanations" = [
        { "index.md" = "Explanations/index.md" },
        { "Symbols" = "Explanations/Symbols.md" },
    ]},
    {"License" = "License.md"},
    {"Repository" = "https://github.com/T-Pau/tpau-cpp-kernal/"},
]

extra_css = [
    "assets/styles/mkdocstrings.css",
    "assets/styles/style.css",
    "assets/styles/tpau.css",
]


[project.extra]
generator = false
icons = { "external" = "octicons/link-external-16" }


[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options.custom_icons = ["overrides/.icons"]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.zensical.extensions.macros]


[project.plugins.mkdocstrings]
default_handler = "doxygen"

[project.plugins.mkdocstrings.handlers.doxygen]
paths = ["tpau-cpp-kernal"]
options = { show_protected = true }


[project.theme]
custom_dir = "docs/.overrides"
favicon = "assets/images/favicon.ico"
font = false
features = [
     "navigation.indexes",
     "toc.integrate"
]

[project.theme.icon]
logo = "tpau/icon"
repo = "fontawesome/brands/github"
admonition = { "todo" = "fontawesome/solid/tools" }

[project.theme.palette]
primary = "custom"
